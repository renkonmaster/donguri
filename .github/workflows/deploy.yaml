name: Deploy to Koyeb

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-koyeb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy service to Koyeb
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and configure the Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_KEY }}

      - name: Install and deploy to Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: "donguri"
          service-name: "involved-cher"
          git-branch: ${{ github.ref_name }}
